<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Link Launcher</title>
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="rgb(15,82,186)"/><text x="50%" y="55%" font-size="68" text-anchor="middle" dominant-baseline="middle" style="filter: drop-shadow(0px 0px 14px rgb(0,240,255))">🎮</text></svg>'>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2b2b2b;
            --text-main: #e0e0e0;
            --text-dim: #888888;
            --accent: #4caf50;
            --btn-edit: #2196f3;
            --danger: #cf6679;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.3rem; font-weight: 600; }

        .mode-btn {
            background-color: var(--btn-edit);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mode-btn.editing { background-color: var(--accent); }

        .edit-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            display: none;
        }

        body.mode-edit .edit-panel { display: block; }

        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }

        input {
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
            user-select: text;
        }

        .add-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .game-list { display: flex; flex-direction: column; gap: 8px; }

        .game-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .game-item.played:not(.editing-row) { opacity: 0.5; }
        .game-item.played:not(.editing-row) .game-title { text-decoration: line-through; color: var(--text-dim); }

        .checkbox-container { display: flex; align-items: center; cursor: pointer; }
        .custom-chk { width: 24px; height: 24px; border: 2px solid #555; border-radius: 6px; position: relative; }
        .game-item.played .custom-chk { background-color: var(--accent); border-color: var(--accent); }
        .game-item.played .custom-chk::after {
            content: ''; position: absolute; left: 7px; top: 3px; width: 5px; height: 10px;
            border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg);
        }

        .game-icon { width: 28px; height: 28px; border-radius: 6px; background-color: #2a2a2a; object-fit: contain; }
        .game-info { flex-grow: 1; min-width: 0; }
        .game-title { font-weight: 600; font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .game-meta { font-size: 0.75rem; color: var(--text-dim); }

        .play-link {
            background-color: #2a2a2a; color: var(--text-main); text-decoration: none;
            padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; border: 1px solid #3a3a3a;
        }

        .drag-handle { cursor: grab; color: var(--text-dim); font-size: 1.2rem; display: none; }
        .row-actions { display: none; gap: 8px; }
        .inline-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 4px; }
        .inline-btn.edit { color: var(--btn-edit); }
        .inline-btn.del { color: var(--danger); }
        .empty-state { text-align: center; padding: 30px; color: var(--text-dim); font-size: 0.9rem; }

        body.mode-edit .checkbox-container, body.mode-edit .play-link { display: none !important; }
        body.mode-edit .drag-handle, body.mode-edit .row-actions { display: flex; }
        .game-item.dragging { opacity: 0.4; border-style: dashed; }
    </style>
</head>
<body>

    <header>
        <h1 id="headerTitle">🎮 Link Tracker</h1>
        <button id="modeBtn" class="mode-btn" onclick="toggleMode()">✏️</button>
    </header>

    <div class="edit-panel">
        <div class="form-group">
            <input type="hidden" id="editId">
            <input type="url" id="urlInput" placeholder="Paste Game URL (https://...)" required>
            <div class="input-row">
                <input type="text" id="nameInput" placeholder="Custom Name (Optional)">
                <input type="time" id="timeInput" value="00:00" style="max-width: 120px;">
            </div>
            <button class="add-btn" id="submitBtn" onclick="handleSubmit()">＋ Add</button>
        </div>
    </div>

    <div class="game-list" id="gameContainer"></div>

    <script>
        let isEditMode = false;
        let games = JSON.parse(localStorage.getItem('daily_games_rotation')) || [];

        function parseResetTime(timeValue) {
            const fallback = [0, 0];
            if (typeof timeValue !== 'string') return fallback;

            const match = timeValue.match(/^(\d{1,2}):(\d{2})$/);
            if (!match) return fallback;

            const hour = Number(match[1]);
            const minute = Number(match[2]);
            if (!Number.isInteger(hour) || !Number.isInteger(minute)) return fallback;
            if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return fallback;

            return [hour, minute];
        }

        function processAutoResets() {
            const now = new Date();
            let stateChanged = false;

            games = games.map(game => {
                if (!game.played || !game.lastChecked) return game;

                const lastCheckedDate = new Date(game.lastChecked);
                const [resetHour, resetMin] = parseResetTime(game.time);
                
                let resetDeadline = new Date(now.getFullYear(), now.getMonth(), now.getDate(), resetHour, resetMin, 0);

                if (now < resetDeadline) {
                    resetDeadline.setDate(resetDeadline.getDate() - 1);
                }

                if (lastCheckedDate < resetDeadline) {
                    stateChanged = true;
                    return { ...game, played: false, lastChecked: null };
                }
                return game;
            });

            if (stateChanged) saveToStorage();
        }

        function toggleMode() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('mode-edit', isEditMode);
            const btn = document.getElementById('modeBtn');
            btn.textContent = isEditMode ? '💾' : '✏️';
            btn.classList.toggle('editing', isEditMode);
            document.getElementById('headerTitle').textContent = isEditMode ? '⚙️ Manage List' : '🎮 Link Tracker';
            
            if (!isEditMode) resetForm();
            renderList();
        }

        function saveToStorage() {
            localStorage.setItem('daily_games_rotation', JSON.stringify(games));
        }

        function handleSubmit() {
            const urlIn = document.getElementById('urlInput');
            const nameIn = document.getElementById('nameInput');
            const timeIn = document.getElementById('timeInput');
            const editIdIn = document.getElementById('editId');

            let urlVal = urlIn.value.trim();
            let nameVal = nameIn.value.trim();
            let timeVal = timeIn.value || '00:00';

            if (!urlVal) return alert('Please enter a game URL.');
            if (!/^https?:\/\//i.test(urlVal)) urlVal = 'https://' + urlVal;

            try {
                const host = new URL(urlVal).hostname;
                if (!nameVal) {
                    let cleaned = host.replace('www.', '').split('.')[0];
                    nameVal = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
                }

                if (editIdIn.value) {
                    const targetId = parseInt(editIdIn.value);
                    games = games.map(g => g.id === targetId ? { ...g, name: nameVal, url: urlVal, time: timeVal } : g);
                } else {
                    games.push({ id: Date.now(), name: nameVal, url: urlVal, time: timeVal, played: false, lastChecked: null });
                }

                saveToStorage();
                resetForm();
                renderList();
            } catch (e) {
                alert('Invalid URL format.');
            }
        }

        function resetForm() {
            document.getElementById('urlInput').value = '';
            document.getElementById('nameInput').value = '';
            document.getElementById('timeInput').value = '00:00';
            document.getElementById('editId').value = '';
            document.getElementById('submitBtn').textContent = '＋ Add';
        }

        function startInlineEdit(id) {
            const game = games.find(g => g.id === id);
            if (!game) return;

            document.getElementById('urlInput').value = game.url;
            document.getElementById('nameInput').value = game.name;
            document.getElementById('timeInput').value = game.time;
            document.getElementById('editId').value = game.id;
            document.getElementById('submitBtn').textContent = '💾 Update';
            document.getElementById('urlInput').focus();
        }

        function toggleCheck(id) {
            games = games.map(g => g.id === id ? { ...g, played: !g.played, lastChecked: !g.played ? new Date().toISOString() : null } : g);
            saveToStorage();
            renderList();
        }

        function deleteGame(id) {
            games = games.filter(g => g.id !== id);
            saveToStorage();
            if(document.getElementById('editId').value == id) resetForm();
            renderList();
        }

        function handlePlayClick(id) {
            setTimeout(() => {
                games = games.map(g => g.id === id ? { ...g, played: true, lastChecked: new Date().toISOString() } : g);
                saveToStorage();
                renderList();
            }, 300);
        }

        function normalizeExternalUrl(rawUrl) {
            try {
                const parsed = new URL(rawUrl);
                if (parsed.protocol === 'http:' || parsed.protocol === 'https:') return parsed.toString();
            } catch (e) {}
            return '#';
        }

        function renderList() {
            processAutoResets();
            const container = document.getElementById('gameContainer');
            container.innerHTML = '';

            if (games.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'No link tracked.';
                container.appendChild(empty);
                return;
            }

            games.forEach((game) => {
                const gameId = Number(game.id);
                if (!Number.isFinite(gameId)) return;

                const safeUrl = normalizeExternalUrl(game.url);
                let hostname = '';
                if (safeUrl !== '#') {
                    try {
                        hostname = new URL(safeUrl).hostname;
                    } catch (e) {}
                }
                const faviconSrc = hostname
                    ? `https://icons.duckduckgo.com/ip3/${encodeURIComponent(hostname)}.ico`
                    : 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23888%22><rect width=%2224%22 height=%2224%22 rx=%224%22/></svg>';
                const displayName = typeof game.name === 'string' && game.name.trim() ? game.name : 'Untitled';
                const displayTime = typeof game.time === 'string' ? game.time : '00:00';

                const item = document.createElement('div');
                item.className = `game-item ${game.played ? 'played' : ''} ${isEditMode ? 'editing-row' : ''}`;
                item.setAttribute('draggable', isEditMode ? 'true' : 'false');
                item.setAttribute('data-id', String(gameId));

                const dragHandle = document.createElement('div');
                dragHandle.className = 'drag-handle';
                dragHandle.textContent = '☰';
                item.appendChild(dragHandle);

                const checkboxContainer = document.createElement('div');
                checkboxContainer.className = 'checkbox-container';
                checkboxContainer.addEventListener('click', () => toggleCheck(gameId));
                const customChk = document.createElement('span');
                customChk.className = 'custom-chk';
                checkboxContainer.appendChild(customChk);
                item.appendChild(checkboxContainer);

                const icon = document.createElement('img');
                icon.className = 'game-icon';
                icon.src = faviconSrc;
                icon.alt = '';
                icon.addEventListener('error', () => {
                    icon.src = 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23888%22><rect width=%2224%22 height=%2224%22 rx=%224%22/></svg>';
                });
                item.appendChild(icon);

                const gameInfo = document.createElement('div');
                gameInfo.className = 'game-info';
                const gameTitle = document.createElement('div');
                gameTitle.className = 'game-title';
                gameTitle.textContent = displayName;
                const gameMeta = document.createElement('div');
                gameMeta.className = 'game-meta';
                gameMeta.textContent = `Resets at ${displayTime}`;
                gameInfo.appendChild(gameTitle);
                gameInfo.appendChild(gameMeta);
                item.appendChild(gameInfo);

                const playLink = document.createElement('a');
                playLink.className = 'play-link';
                playLink.textContent = 'OPEN ↗';
                playLink.target = '_blank';
                playLink.rel = 'noopener noreferrer';
                playLink.href = safeUrl;
                if (safeUrl !== '#') {
                    playLink.addEventListener('click', () => handlePlayClick(gameId));
                }
                item.appendChild(playLink);

                const rowActions = document.createElement('div');
                rowActions.className = 'row-actions';
                const editBtn = document.createElement('button');
                editBtn.className = 'inline-btn edit';
                editBtn.type = 'button';
                editBtn.textContent = '✏️';
                editBtn.addEventListener('click', () => startInlineEdit(gameId));

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'inline-btn del';
                deleteBtn.type = 'button';
                deleteBtn.textContent = '🗑️';
                deleteBtn.addEventListener('click', () => deleteGame(gameId));

                rowActions.appendChild(editBtn);
                rowActions.appendChild(deleteBtn);
                item.appendChild(rowActions);

                if (isEditMode) {
                    item.addEventListener('dragstart', () => item.classList.add('dragging'));
                    item.addEventListener('dragend', () => { item.classList.remove('dragging'); reorderArray(); });
                }
                container.appendChild(item);
            });
        }

        const container = document.getElementById('gameContainer');
        container.addEventListener('dragover', e => {
            if (!isEditMode) return;
            e.preventDefault();
            const draggingElement = document.querySelector('.dragging');
            if (!draggingElement) return;
            const afterElement = [...container.querySelectorAll('.game-item:not(.dragging)')].reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = e.clientY - box.top - box.height / 2;
                return (offset < 0 && offset > closest.offset) ? { offset: offset, element: child } : closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;

            if (afterElement == null) container.appendChild(draggingElement);
            else container.insertBefore(draggingElement, afterElement);
        });

        function reorderArray() {
            games = [...document.querySelectorAll('.game-item')].map(row => games.find(g => g.id === parseInt(row.getAttribute('data-id')))).filter(Boolean);
            saveToStorage();
        }

        renderList();
    </script>
</body>
</html>
